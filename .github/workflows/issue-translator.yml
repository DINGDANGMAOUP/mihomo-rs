name: 'issue-translator'
on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: usthe/issues-translate-action@b41f55ddc81d7d54bd542a4f289fe28ec081898e # v2.7
        with:
          IS_MODIFY_TITLE: false
          CUSTOM_BOT_NOTE: Bot detected the issue body's language is not English, translate it automatically. рҹ‘Ҝрҹ‘ӯрҹҸ»рҹ§‘вҖҚрҹӨқвҖҚрҹ§‘рҹ‘«рҹ§‘рҹҸҝвҖҚрҹӨқвҖҚрҹ§‘рҹҸ»рҹ‘©рҹҸҫвҖҚрҹӨқвҖҚрҹ‘ЁрҹҸҝрҹ‘¬рҹҸҝ
