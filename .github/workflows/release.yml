name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-version:
    name: Validate Tag Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag version matches Cargo.toml
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          echo "Tag version: ${TAG_VERSION}"
          echo "Cargo.toml version: ${CARGO_VERSION}"
          if [ -z "${CARGO_VERSION}" ]; then
            echo "Failed to read version from Cargo.toml"
            exit 1
          fi
          if [ "${TAG_VERSION}" != "${CARGO_VERSION}" ]; then
            echo "Tag version does not match Cargo.toml version"
            exit 1
          fi

  create-release:
    name: Create Release
    needs: validate-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "${GITHUB_REF#refs/tags/}" | tail -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" ${GITHUB_REF#refs/tags/})
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..${GITHUB_REF#refs/tags/})
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false

  build-release:
    name: Build Release
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: mihomo-rs
            asset_name: mihomo-rs-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: mihomo-rs
            asset_name: mihomo-rs-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: mihomo-rs
            asset_name: mihomo-rs-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: mihomo-rs
            asset_name: mihomo-rs-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: mihomo-rs.exe
            asset_name: mihomo-rs-windows-amd64.exe

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Strip binary (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Strip binary (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: aarch64-linux-gnu-strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Strip binary (macOS)
        if: startsWith(matrix.os, 'macos')
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Create archive (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
          mv ${{ matrix.asset_name }}.tar.gz ../../../

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ${{ matrix.asset_name }}.zip ${{ matrix.artifact_name }}
          mv ${{ matrix.asset_name }}.zip ../../../
        shell: bash

      - name: Generate checksum (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: shasum -a 256 ./${{ matrix.asset_name }}.tar.gz > ./${{ matrix.asset_name }}.tar.gz.sha256

      - name: Generate checksum (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $hash = (Get-FileHash ".\${{ matrix.asset_name }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.asset_name }}.zip" | Out-File -FilePath ".\${{ matrix.asset_name }}.zip.sha256" -Encoding ascii -NoNewline
        shell: pwsh

      - name: Upload Release Asset (Linux/macOS)
        if: matrix.os != 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./${{ matrix.asset_name }}.tar.gz
            ./${{ matrix.asset_name }}.tar.gz.sha256

      - name: Upload Release Asset (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./${{ matrix.asset_name }}.zip
            ./${{ matrix.asset_name }}.zip.sha256

  publish-crate:
    name: Publish to crates.io
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Pre-publish smoke test
        run: cargo test --all-features --locked

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES_TOKEN }}
        continue-on-error: false

  publish-homebrew-tap:
    name: Publish Homebrew Formula
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HOMEBREW_TAP_REPO: ${{ secrets.HOMEBREW_TAP_REPO }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Check Homebrew tap settings
        id: tap_settings
        run: |
          if [ -n "${HOMEBREW_TAP_REPO}" ] && [ -n "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Homebrew tap publishing skipped because HOMEBREW_TAP_REPO or HOMEBREW_TAP_TOKEN is not configured."
          fi

      - uses: actions/checkout@v6
        if: steps.tap_settings.outputs.enabled == 'true'

      - name: Checkout tap repository
        if: steps.tap_settings.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          repository: ${{ env.HOMEBREW_TAP_REPO }}
          token: ${{ env.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Generate formula
        if: steps.tap_settings.outputs.enabled == 'true'
        run: |
          chmod +x .github/scripts/generate-homebrew-formula.sh
          .github/scripts/generate-homebrew-formula.sh \
            "${GITHUB_REPOSITORY}" \
            "${GITHUB_REF_NAME}" \
            "homebrew-tap/Formula/mihomo-rs.rb"

      - name: Commit and push formula update
        if: steps.tap_settings.outputs.enabled == 'true'
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mihomo-rs.rb
          if git diff --cached --quiet; then
            echo "No Homebrew formula changes to publish"
            exit 0
          fi
          git commit -m "mihomo-rs ${GITHUB_REF_NAME}"
          git push
